<ion-content [fullscreen]="true">
  <div class="login-wrapper">
    <ion-card class="interactive-card">
      <ion-grid>
        <ion-row class="ion-align-items-center">

          <ion-col size="12" size-md="7">
            <div class="form-section">
              <ion-card-title>BIENVENIDO</ion-card-title>
              <div class="inputs-wrapper">

                <div class="custom-input">
                  <label class="input-label">Usuario</label>
                  <ion-input
                    type="text"
                    placeholder="tu_usuario"
                    class="styled-input"
                    [(ngModel)]="nombreUsuario">
                  </ion-input>
                </div>

                <div class="custom-input">
                  <label class="input-label">Contraseña</label>
                  <ion-input
                    type="password"
                    placeholder="********"
                    class="styled-input"
                    [(ngModel)]="contrasena">
                  </ion-input>
                </div>

                <ion-note color="danger" *ngIf="error">{{ error }}</ion-note>

              </div>

              <ion-button
                expand="block"
                class="login-button"
                [disabled]="cargando"
                (click)="iniciarSesion()">
                {{ cargando ? 'Cargando...' : 'Iniciar Sesión' }}
              </ion-button>

              <div class="ion-text-center">
                <ion-note>
                  ¿No tienes cuenta?
                  <b [routerLink]="['/register']" class="link-register">Regístrate aquí</b>
                </ion-note>
              </div>
            </div>
          </ion-col>

          <ion-col size="12" size-md="5" class="ion-text-center">
            <div class="logo-section">
              <ion-icon class="img-login-large" name="person-sharp"></ion-icon>
            </div>
          </ion-col>

        </ion-row>
      </ion-grid>
    </ion-card>
  </div>
</ion-content>
