# ==============================================================
# CONFIGURACION DEL SERVIDOR
# ==============================================================
server.port=8080

# ==============================================================
# CONFIGURACION DE BASE DE DATOS (MySQL / MariaDB / XAMPP)
# ==============================================================
# Asegurate de que tu base de datos se llame 'gestion_alumnos'
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_alumnos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Si usas XAMPP, la contrasena por defecto esta vacia:
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# CONFIGURACION DE JPA / HIBERNATE
# ==============================================================
# ESTO ES VITAL: 'none' le dice a Spring que NO cree ni modifique las tablas.
# Respetara el script SQL que ya has ejecutado.
spring.jpa.hibernate.ddl-auto=none

# Mostramos las consultas en consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Forzamos el dialecto de MariaDB para evitar el error "Unknown column 'RESERVED'"
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect